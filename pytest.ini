[tool:pytest]
# Test discovery patterns for organized test structure
testpaths = tests
    research/*/tests

# Python files to consider for test discovery
python_files = test_*.py *_test.py

# Test class naming patterns - exclude dataclasses and enums more strictly
python_classes = ^Test[A-Z][a-zA-Z0-9]*$

# Test function naming patterns  
python_functions = test_*

# Add project root to Python path for imports
pythonpath = .
    ..

# Configure test discovery for organized structure
# This will discover tests in:
# - tests/ (main test directory with subdirectories)
# - tests/framework/ (framework internal tests)
# - tests/falsification/ (falsification tests)
# - research/interoceptive_gating/tests/ (research domain tests)

# Test execution settings
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --ignore=tests/falsification/
    --ignore=tests/framework/
    --ignore=examples/

# Markers for different test categories
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may use external resources)
    research: Research-specific tests (domain-specific experiments)
    core: Core framework tests (library code)
    slow: Tests that take more than 1 second
    neural: Tests requiring neural data processing
    behavioral: Tests for behavioral experiments

# Minimum version required
minversion = 6.0

# Test discovery timeout (in seconds)
timeout = 300

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage configuration (if coverage plugin is used)
# addopts = --cov=apgi_framework --cov=research --cov-report=html --cov-report=term-missing
