version: '3.8'

services:
  apgi-framework:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apgi-framework
    ports:
      - "8000:8000"
    volumes:
      - ./apgi_framework:/app/apgi_framework:cached
      - ./utils:/app/utils:cached
      - ./examples:/app/examples:cached
      - ./research:/app/research:cached
      - ./config:/app/config:cached
      - ./core:/app/core:cached
      - ./docs:/app/docs:cached
      - ./tests:/app/tests:cached
      - ./data:/app/data
      - ./results:/app/results
      - ./logs:/app/logs
      - ./figures:/app/figures
      - ./reports:/app/reports
      - ./apgi_outputs:/app/apgi_outputs
    environment:
      - PYTHONPATH=/app
      - APGI_ENV=development
      - APGI_LOG_LEVEL=DEBUG
    depends_on:
      - redis
      - postgres
    networks:
      - apgi-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: apgi-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - apgi-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  postgres:
    image: postgres:15-alpine
    container_name: apgi-postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    environment:
      - POSTGRES_DB=apgi_framework
      - POSTGRES_USER=apgi_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?err}
    networks:
      - apgi-network
    restart: unless-stopped

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    container_name: apgi-jupyter
    ports:
      - "127.0.0.1:8888:8888"
    volumes:
      - ./apgi_framework:/app/apgi_framework:cached
      - ./utils:/app/utils:cached
      - ./examples:/app/examples:cached
      - ./research:/app/research:cached
      - ./config:/app/config:cached
      - ./core:/app/core:cached
      - ./notebooks:/app/notebooks
      - ./data:/app/data
      - ./results:/app/results
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:?err}
    networks:
      - apgi-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: apgi-nginx
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - apgi-framework
    networks:
      - apgi-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: apgi-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - apgi-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: apgi-grafana
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?err}
    networks:
      - apgi-network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  apgi-network:
    driver: bridge
